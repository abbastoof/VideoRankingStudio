name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        # Keep this list in sync with infrastructure/terraform/envs/.
        # Add `staging` back once envs/staging exists — dispatching to a
        # nonexistent env silently fails at `terraform init`.
        options: [dev, production]
        default: dev

concurrency:
  group: deploy-${{ github.event.inputs.environment || (startsWith(github.ref, 'refs/tags/') && 'production' || 'dev') }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VERSION: '1.7.5'

jobs:
  resolve:
    name: Resolve deploy target
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.env.outputs.env }}
    steps:
      - id: env
        # Approvals happen via GitHub's Environment protection rules on each
        # downstream job's `environment:` binding — no need to plumb a boolean.
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

  terraform:
    name: Terraform apply
    needs: resolve
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve.outputs.env }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: infrastructure/terraform/envs/${{ needs.resolve.outputs.env }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform plan
        working-directory: infrastructure/terraform/envs/${{ needs.resolve.outputs.env }}
        run: terraform plan -input=false -out=plan.tfplan

      - name: Terraform apply
        working-directory: infrastructure/terraform/envs/${{ needs.resolve.outputs.env }}
        run: terraform apply -input=false -auto-approve plan.tfplan

  migrate:
    name: Deploy schema migrations
    needs: [resolve, terraform]
    runs-on: ubuntu-latest
    # Bind to the target env so environment-scoped secrets
    # (AWS_DEPLOY_ROLE_ARN, DB access) resolve. Without this binding, a
    # per-env role kept as an environment secret would resolve to empty and
    # the AWS credentials step would fail with a misleading error.
    environment:
      name: ${{ needs.resolve.outputs.env }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9.4.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch DB connection + deploy migrations
        # Migrations run BEFORE the new container image rolls, so the API
        # never boots against a schema that doesn't have its expected
        # columns. Migrations must be backwards-compatible with the
        # currently-running code — that's a coding constraint, not something
        # the pipeline can enforce, but ordering here is a hard requirement.
        #
        # The DATABASE_URL is resolved and consumed in a single step so the
        # password never crosses a GitHub Actions output boundary (masked
        # logs still expose values to downstream jobs).
        run: |
          set -euo pipefail
          DB_JSON=$(aws secretsmanager get-secret-value \
            --secret-id vrs-${{ needs.resolve.outputs.env }}/db-master \
            --query SecretString --output text)
          USER=$(echo "$DB_JSON" | jq -r .username)
          PASS=$(echo "$DB_JSON" | jq -r .password)
          DBN=$(echo "$DB_JSON" | jq -r .dbname)
          echo "::add-mask::$PASS"
          HOST=$(aws rds describe-db-clusters \
            --db-cluster-identifier vrs-${{ needs.resolve.outputs.env }}-postgres \
            --query 'DBClusters[0].Endpoint' --output text)
          export DATABASE_URL="postgresql://$USER:$PASS@$HOST:5432/$DBN"
          pnpm db:migrate:deploy

  ecs-deploy:
    name: Roll new task definitions
    needs: [resolve, terraform, migrate]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve.outputs.env }}
    permissions:
      id-token: write
      contents: read
      packages: read
    strategy:
      matrix:
        service: [api, web, workers]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Compute image tag
        id: image
        # Always resolve to the commit SHA, even for a v-tag deploy. CI
        # publishes images tagged with the SHA only (it doesn't run on tag
        # pushes), and a tag's `github.sha` is the commit the tag points at,
        # so the SHA-tagged image already exists in GHCR when the tag ships.
        run: echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Wait for CI image to be published
        # Deploy triggers on the same push event as CI. CI's docker job runs
        # in parallel and publishes ghcr.io/OWNER/REPO/SERVICE:${sha}
        # asynchronously — without this poll, `update-service` fires against
        # a tag that doesn't exist yet and ECS fails on image pull minutes
        # later.
        env:
          IMAGE: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ steps.image.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          for i in $(seq 1 30); do
            if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
              echo "Image $IMAGE is available"
              exit 0
            fi
            echo "Waiting for $IMAGE (attempt $i/30)…"
            sleep 20
          done
          echo "Image $IMAGE never appeared — CI docker job likely failed or is stuck" >&2
          exit 1

      - name: Update service to new image
        env:
          ENV: ${{ needs.resolve.outputs.env }}
          SERVICE: vrs-${{ needs.resolve.outputs.env }}-${{ matrix.service }}
          IMAGE: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail

          CLUSTER=vrs-${ENV}
          TASK_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].taskDefinition' --output text)

          TASK_JSON=$(aws ecs describe-task-definition --task-definition "$TASK_ARN")
          NEW_JSON=$(jq --arg img "$IMAGE" '
            .taskDefinition
            | {
                family, taskRoleArn, executionRoleArn, networkMode,
                containerDefinitions: (.containerDefinitions | map(.image = $img)),
                volumes, placementConstraints, requiresCompatibilities,
                cpu, memory, runtimePlatform
              }
            | with_entries(select(.value != null))
          ' <<< "$TASK_JSON")

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_JSON" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_ARN" \
            --force-new-deployment >/dev/null

          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"

  post-deploy:
    name: Smoke checks
    needs: [resolve, ecs-deploy]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve.outputs.env }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Guard — APEX_DOMAIN present
        run: |
          set -euo pipefail
          if [[ -z "${{ vars.APEX_DOMAIN }}" ]]; then
            echo "vars.APEX_DOMAIN is not set for environment '${{ needs.resolve.outputs.env }}' — cannot smoke-test." >&2
            exit 1
          fi

      - name: Smoke — API /health
        env:
          API_URL: https://api.${{ vars.APEX_DOMAIN }}
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$API_URL/health")
            if [[ "$code" == "200" ]]; then
              echo "API healthy"
              exit 0
            fi
            echo "API not ready ($code), sleeping…"
            sleep 10
          done
          echo "API failed to become ready" >&2
          exit 1

      - name: Smoke — web root
        # Silent regression on the web tier was invisible when only the API
        # was smoked. A 5xx from the front door blocks users from ever
        # reaching the API, so surface it here.
        env:
          WEB_URL: https://${{ vars.APEX_DOMAIN }}
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$WEB_URL/")
            if [[ "$code" == "200" ]]; then
              echo "Web healthy"
              exit 0
            fi
            echo "Web not ready ($code), sleeping…"
            sleep 10
          done
          echo "Web failed to become ready" >&2
          exit 1
