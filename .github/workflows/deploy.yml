name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, production]
        default: dev

concurrency:
  group: deploy-${{ github.event.inputs.environment || (startsWith(github.ref, 'refs/tags/') && 'production' || 'dev') }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VERSION: '1.7.5'

jobs:
  resolve:
    name: Resolve deploy target
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.env.outputs.env }}
      needs_approval: ${{ steps.env.outputs.needs_approval }}
    steps:
      - id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi
          if [[ "${{ github.event.inputs.environment }}" == "production" || "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "needs_approval=true" >> $GITHUB_OUTPUT
          else
            echo "needs_approval=false" >> $GITHUB_OUTPUT
          fi

  terraform:
    name: Terraform apply
    needs: resolve
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve.outputs.env }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: infrastructure/terraform/envs/${{ needs.resolve.outputs.env }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform plan
        working-directory: infrastructure/terraform/envs/${{ needs.resolve.outputs.env }}
        run: terraform plan -input=false -out=plan.tfplan

      - name: Terraform apply
        working-directory: infrastructure/terraform/envs/${{ needs.resolve.outputs.env }}
        run: terraform apply -input=false -auto-approve plan.tfplan

  ecs-deploy:
    name: Roll new task definitions
    needs: [resolve, terraform]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        service: [api, web, workers]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Compute image tag
        id: image
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Update service to new image
        env:
          ENV: ${{ needs.resolve.outputs.env }}
          SERVICE: vrs-${{ needs.resolve.outputs.env }}-${{ matrix.service }}
          IMAGE: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail

          CLUSTER=vrs-${ENV}
          TASK_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].taskDefinition' --output text)

          TASK_JSON=$(aws ecs describe-task-definition --task-definition "$TASK_ARN")
          NEW_JSON=$(jq --arg img "$IMAGE" '
            .taskDefinition
            | {
                family, taskRoleArn, executionRoleArn, networkMode,
                containerDefinitions: (.containerDefinitions | map(.image = $img)),
                volumes, placementConstraints, requiresCompatibilities,
                cpu, memory, runtimePlatform
              }
            | with_entries(select(.value != null))
          ' <<< "$TASK_JSON")

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_JSON" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_ARN" \
            --force-new-deployment >/dev/null

          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"

  post-deploy:
    name: Smoke checks + migrations
    needs: [resolve, ecs-deploy]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9.4.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch database URL from Secrets Manager
        id: db
        run: |
          DB_JSON=$(aws secretsmanager get-secret-value \
            --secret-id vrs-${{ needs.resolve.outputs.env }}/db-master \
            --query SecretString --output text)
          USER=$(echo "$DB_JSON" | jq -r .username)
          PASS=$(echo "$DB_JSON" | jq -r .password)
          DBN=$(echo "$DB_JSON" | jq -r .dbname)
          echo "::add-mask::$PASS"
          HOST=$(aws rds describe-db-clusters \
            --db-cluster-identifier vrs-${{ needs.resolve.outputs.env }}-postgres \
            --query 'DBClusters[0].Endpoint' --output text)
          echo "url=postgresql://$USER:$PASS@$HOST:5432/$DBN" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy pending Prisma migrations
        env:
          DATABASE_URL: ${{ steps.db.outputs.url }}
        run: pnpm db:migrate:deploy

      - name: Smoke — API root
        env:
          API_URL: https://api.${{ vars.APEX_DOMAIN }}
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$API_URL/health")
            if [[ "$code" == "200" ]]; then
              echo "API healthy"
              exit 0
            fi
            echo "API not ready ($code), sleeping…"
            sleep 10
          done
          echo "API failed to become ready" >&2
          exit 1
