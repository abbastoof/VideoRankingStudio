name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.11.1'
  PNPM_VERSION: '9.4.0'
  PYTHON_VERSION: '3.11'
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  node:
    name: Node — lint · typecheck · test · build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vrs
          POSTGRES_PASSWORD: vrs
          POSTGRES_DB: vrs
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U vrs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: ${{ env.PNPM_VERSION }} }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Migrate test DB
        run: pnpm db:migrate:deploy
        env:
          DATABASE_URL: postgresql://vrs:vrs@localhost:5432/vrs

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://vrs:vrs@localhost:5432/vrs
          REDIS_URL: redis://localhost:6379/0
          JWT_ACCESS_SECRET: ${{ secrets.TEST_JWT_ACCESS_SECRET || 'test_access_secret_min_32_characters_____' }}
          JWT_REFRESH_SECRET: ${{ secrets.TEST_JWT_REFRESH_SECRET || 'test_refresh_secret_min_32_characters____' }}
          INTERNAL_SERVICE_TOKEN: test_internal_token_abcdefghijklmnop
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
          S3_BUCKET_UPLOADS: vrs-uploads
          S3_BUCKET_GENERATED: vrs-generated
          S3_BUCKET_EXPORTS: vrs-exports
          S3_BUCKET_PUBLIC: vrs-public
          WEB_URL: http://localhost:3000
          API_URL: http://localhost:4000
          EMAIL_FROM_ADDRESS: noreply@vrs.test

      - name: Build
        run: pnpm build

      - name: Audit
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

  python:
    name: Python — lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ./apps/workers[dev]
      - name: Ruff
        run: ruff check apps/workers/src
      - name: Mypy
        run: mypy apps/workers/src --no-incremental
        continue-on-error: true
      - name: Tests
        run: pytest apps/workers/tests

  docker:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [node, python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/api.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/web.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build workers
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/workers.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/workers:${{ github.sha }}
          cache-from: type=gha,scope=workers
          cache-to: type=gha,mode=max,scope=workers

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api
        continue-on-error: true
