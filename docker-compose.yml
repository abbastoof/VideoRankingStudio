# =============================================================================
# Local development infrastructure for VideoRankingStudio.
# Brings up: postgres, redis, minio, rabbitmq, mailhog, ffmpeg-utils.
# Application services (web, api, workers) are run with `pnpm dev` against
# these, but production-equivalent Dockerized builds are available under the
# `app-*` profile (`docker compose --profile app up`).
# =============================================================================

name: vrs

services:
  # ---------------------------------------------------------------------------
  # Postgres — primary OLTP store.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vrs
      POSTGRES_PASSWORD: vrs
      POSTGRES_DB: vrs
      POSTGRES_MULTIPLE_DATABASES: vrs,vrs_shadow,vrs_test
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vrs -d vrs']
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis — cache, rate-limit counters, job-progress pubsub.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory-policy', 'volatile-lru']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for local dev.
  # Buckets are created on first start by the `minio-init` companion below.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/vrs-uploads || true;
      mc mb -p local/vrs-generated || true;
      mc mb -p local/vrs-exports || true;
      mc mb -p local/vrs-public || true;
      mc anonymous set download local/vrs-public;
      echo 'minio buckets ready';
      "
    restart: 'no'

  # ---------------------------------------------------------------------------
  # RabbitMQ — broker for AI worker jobs.
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: vrs
      RABBITMQ_DEFAULT_PASS: vrs
    ports:
      - '5672:5672'    # AMQP
      - '15672:15672'  # management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Mailhog — catches SMTP locally so we can inspect OTP/transactional emails.
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # web UI

  # ---------------------------------------------------------------------------
  # Application services — opt-in via `--profile app`.
  # ---------------------------------------------------------------------------
  api:
    profiles: ['app']
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    ports:
      - '4000:4000'

  web:
    profiles: ['app']
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    env_file: .env
    depends_on:
      - api
    ports:
      - '3000:3000'

  workers:
    profiles: ['app']
    build:
      context: .
      dockerfile: infrastructure/docker/workers.Dockerfile
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio:
        condition: service_healthy
    ports:
      - '5000:5000'

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:
